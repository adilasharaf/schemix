name: schemix_workspace
description: >
  Model-definition and code-generation platform built on top of build_runner.
  Define a schema once and generate artifacts for multiple targets from a
  single source of truth.

repository: https://github.com/adilasharaf/schemix
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

workspace:
  # Core
  - packages/schemix
  - packages/schemix_builder

  # Generators
  - packages/serializable_schemix_generator
  - packages/drift_schemix_generator
  - packages/drizzle_schemix_generator
  - packages/zod_schemix_generator
  - packages/ts_schemix_generator
  - packages/gorm_schemix_generator
  - packages/go_serializable_schemix_generator

  # Future generators
  # - packages/openapi_schemix_generator
  # - packages/graphql_schemix_generator
  # - packages/prisma_schemix_generator
  # - packages/kotlin_schemix_generator
  # - packages/swift_schemix_generator

  # Examples
  - examples/infolder
  - examples/outfolder/example

  # Internal tools
  # - tools/schemix_cli

dev_dependencies:
  melos: ^7.5.1

  glob: any
  yaml: any
  path: any
  lints: any

melos:
  repository: https://github.com/adilasharaf/schemix
  resolution: workspace

  ide:
    vscode: true

  command:
    bootstrap:
      usePubspecOverrides: true
      enforceLockfile: true

    version:
      linkToCommits: true
      workspaceChangelog: true

  scripts:
    get:
      description: Install dependencies for workspace
      run: dart pub get

    analyze:
      description: Analyze all packages
      run: dart analyze .
      exec:
        concurrency: 4

    format:
      description: Format all Dart files
      run: dart format .
      exec:
        concurrency: 4

    fix:
      description: Apply Dart fixes
      run: dart fix --apply
      exec:
        concurrency: 2

    test:
      run: melos exec --concurrency 4 -- "dart test"
      packageFilters:
        dir-exists: tests

    gen:
      description: Run build_runner in generator packages
      run: dart run build_runner build
      exec:
        concurrency: 1
        failFast: true
      packageFilters:
        dependsOn: build_runner

    gen:watch:
      description: Watch generators
      run: dart run build_runner watch
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner

    clean:
      description: Clean workspace
      run: melos clean

    clean:generated:
      description: Remove generated files
      run: |
        find . -name "*.g.dart" \
          -o -name "*.schemix.dart" \
          -o -name "*.freezed.dart" \
          | xargs rm -f
      exec:
        concurrency: 4

    publish:check:
      description: Verify packages can be published
      run: dart pub publish --dry-run
      exec:
        concurrency: 1

    deps:outdated:
      description: Check outdated dependencies
      run: dart pub outdated
      exec:
        concurrency: 4

    ci:
      description: Full CI pipeline
      run: |
        melos run analyze &&
        melos run gen &&
        melos run test

    quality:
      description: Local quality check
      run: |
        melos run format &&
        melos run analyze &&
        melos run gen &&
        melos run test

    # ─── Toolkit (AI / LLM helpers) ───────────────────────────────────────────
    toolkit:summary:
      description: |
        Generate a full monorepo summary for AI/LLM ingestion.
        Usage:
          melos run toolkit:summary
      run: dart scripts/toolkit.dart summary

    toolkit:files:
      description: |
        Extract specific files from all packages.
        Usage:
          melos run toolkit:files -- pubspec.yaml
          melos run toolkit:files -- "pubspec.yaml,analysis_options.yaml"
          melos run toolkit:files -- "*_repository.dart"
      run: dart scripts/toolkit.dart files

    toolkit:folder:
      description: |
        Deep-dive into a specific folder (tree + line counts + all source files).
        Usage:
          melos run toolkit:folder -- packages/core/lib/src
          melos run toolkit:folder -- apps/mobile/lib/features/auth
      run: dart scripts/toolkit.dart folder

    toolkit:structure:
      description: |
        Directory tree of all packages, or one specific package/folder.
        Usage:
          melos run toolkit:structure
          melos run toolkit:structure -- packages/core
      run: dart scripts/toolkit.dart structure

    toolkit:deps:
      description: "Compact dep overview — Melos graph + dependency sections from every pubspec.yaml."
      run: dart scripts/toolkit.dart deps

    toolkit:search:
      description: |
        Search a text or regex pattern across every source file in every package.
        Usage:
          melos run toolkit:search -- Riverpod
          melos run toolkit:search -- "class.*Repository"
      run: dart scripts/toolkit.dart search

    toolkit:stats:
      description: "Code size table — Dart file count, total lines, blank lines per package."
      run: dart scripts/toolkit.dart stats

    toolkit:changes:
      description: |
        Git-based report of recently modified source files. Defaults to last 7 days.
        Usage:
          melos run toolkit:changes
          melos run toolkit:changes -- 14
      run: dart scripts/toolkit.dart changes

    toolkit:folder:all:
      run: |
        melos exec -- '
          cd "$MELOS_ROOT_PATH"
          RELATIVE_PATH=$(realpath --relative-to="$MELOS_ROOT_PATH" "$MELOS_PACKAGE_PATH")
          melos run toolkit:folder "$RELATIVE_PATH"
        '
      description: "Run toolkit:folder create code summary for all"
      select-package:
        scope:
          - "*schemix*"
          - "*folder"
