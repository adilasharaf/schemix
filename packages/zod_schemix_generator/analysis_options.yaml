include: package:lints/recommended.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.schemix.dart"
    - "**/*.table.dart"
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_empty_else
    - avoid_relative_lib_imports
    - cancel_subscriptions
    - prefer_const_constructors
    - prefer_final_fields
    - sort_constructors_first
    - unawaited_futures