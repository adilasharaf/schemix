name: gorm_schemix_generator
description: >
  Gorm ORM schema generator for Schemix. Produces Go structs with gorm tags
  for every annotated model.
publish_to: none
version: 0.1.0
repository: https://github.com/adilasharaf/schemix

environment:
  sdk: ">=3.11.0 <4.0.0"

resolution: workspace

dependencies:
  schemix: any
  schemix_builder: any
  build: ^4.0.6
  path: ^1.9.1
  glob: ^2.1.3
  analyzer: ^9.0.0

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.15
  test: ^1.30.0
  lints: ^6.1.0
