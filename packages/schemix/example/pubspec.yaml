name: schemix_example
description: Example models for schemix — demonstrating Zod, Prisma, SQL, Drift, API, and Form generation from a single Dart source of truth.

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  # JSON annotation support — @JsonSerializable, @JsonKey
  json_annotation: ^4.11.0

  # Drift — required for generateDrift: true
  drift: ^2.31.0

  # Schemix — the schema generator package
  schemix:
    path: ../

dev_dependencies:
  # Runs schemix builders
  build_runner: ^2.15.0

  # JSON code generation
  json_serializable: ^6.13.0

  # Drift build support
  drift_dev: ^2.31.0
